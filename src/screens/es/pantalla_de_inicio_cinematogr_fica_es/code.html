<script>
        // Micro-interaction for loading text
        const loadingText = document.getElementById('loading-text');
        const statuses = [
            "CONNECTING TO GLOBAL FEEDS...",
            "ANALYZING LIVE MARKETS...",
            "OPTIMIZING ODDS ALGORITHMS...",
            "SECURE TUNNEL ESTABLISHED...",
            "READY FOR ACTION"
        ];
        
        let progress = 0;
        const interval = setInterval(() => {
            progress += 1;
            const statusIndex = Math.min(Math.floor((progress / 100) * statuses.length), statuses.length - 1);
            
            if (progress <= 100) {
                loadingText.innerText = `${statuses[statusIndex]} ${progress}%`;
            } else {
                clearInterval(interval);
                loadingText.classList.add('text-secondary');
            }
        }, 40);

        // Simple mouse tracking parallax for subtle depth
        document.addEventListener('mousemove', (e) => {
            const moveX = (e.clientX - window.innerWidth / 2) * 0.01;
            const moveY = (e.clientY - window.innerHeight / 2) * 0.01;
            document.querySelector('.scale-105').style.transform = `scale(1.05) translate(${moveX}px, ${moveY}px)`;
        });
    </script>
